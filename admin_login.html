<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XBelievers 管理后台</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a1628;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-box {
    background: #112240;
    border: 1px solid #1d3a5f;
    border-radius: 16px;
    padding: 48px 40px;
    width: 400px;
    max-width: 95vw;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo-icon {
    font-size: 48px;
    margin-bottom: 8px;
  }
  .logo h1 {
    color: #64ffda;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .logo p {
    color: #8892b0;
    font-size: 13px;
    margin-top: 4px;
  }
  .form-group {
    margin-bottom: 20px;
  }
  .form-group label {
    display: block;
    color: #ccd6f6;
    font-size: 13px;
    margin-bottom: 8px;
    font-weight: 600;
  }
  .form-group input {
    width: 100%;
    padding: 12px 16px;
    background: #0a192f;
    border: 1px solid #1d3a5f;
    border-radius: 8px;
    color: #e6f1ff;
    font-size: 15px;
    outline: none;
    transition: border-color .2s;
  }
  .form-group input:focus {
    border-color: #64ffda;
    box-shadow: 0 0 0 3px rgba(100,255,218,.1);
  }
  .submit-btn {
    width: 100%;
    padding: 14px;
    background: #64ffda;
    color: #0a192f;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
    margin-top: 8px;
  }
  .submit-btn:hover { opacity: .9; transform: translateY(-1px); }
  .submit-btn:active { transform: translateY(0); }
  .error-msg {
    color: #ff6b6b;
    font-size: 13px;
    margin-top: 12px;
    text-align: center;
    min-height: 18px;
  }
  .footer-note {
    color: #495670;
    font-size: 12px;
    text-align: center;
    margin-top: 24px;
  }
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">
    <div class="logo-icon">🐙</div>
    <h1>XBelievers</h1>
    <p>AI 品牌内容智能工坊 · 管理后台</p>
  </div>
  <form id="loginForm" onsubmit="doLogin(event)">
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="username" placeholder="admin" autocomplete="username" required />
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
    </div>
    <button type="submit" class="submit-btn" id="submitBtn">登录</button>
    <div class="error-msg" id="errorMsg"></div>
  </form>
  <div class="footer-note">初始账号 admin / xbelievers2026</div>
</div>

<script>
const API = location.origin;

async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errorMsg');
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  btn.disabled = true;
  btn.textContent = '登录中...';
  err.textContent = '';

  try {
    const resp = await fetch(`${API}/api/admin/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
      credentials: 'include',
    });
    const data = await resp.json();
    if (data.success) {
      location.href = '/admin';
    } else {
      err.textContent = data.error || '登录失败';
      btn.disabled = false;
      btn.textContent = '登录';
    }
  } catch(e) {
    err.textContent = '网络错误，请稍后重试';
    btn.disabled = false;
    btn.textContent = '登录';
  }
}
</script>
</body>
</html>
